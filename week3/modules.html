<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript ES Modules | WDD 231</title>
    <meta name="description" content="WDD 231 Week 03 practice activity using JavaScript ES modules to organize course and section enrollment code.">
    <meta name="author" content="Werner Moecke">
    <link rel="stylesheet" href="styles/modules.css">
    <script type="module" src="scripts/modules.mjs"></script>
</head>
<body>
    <main>
        <h1 id="courseName"></h1>
        <h2 id="courseCode"></h2>

        <label for="sectionNumber">Choose a section:</label>
        <select id="sectionNumber"></select>

        <div class="buttons">
            <button id="enrollStudent" type="button">Enroll a Student</button>
            <button id="dropStudent" type="button">Drop a Student</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Section</th>
                    <th>Enrolled</th>
                    <th>Instructor</th>
                </tr>
            </thead>
            <tbody id="sections"></tbody>
        </table>
    </main>
</body>
</html>
